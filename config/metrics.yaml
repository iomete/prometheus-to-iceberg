defaults:
  database: "spark_catalog.prom_metrics_db"
  step: "60s"

metrics:
  - name: "node_cpu_seconds_total"
    query: 'rate(node_cpu_seconds_total{mode="idle"}[5m])'
    table: "node_cpu_idle_rate"
  - name: "http_requests_total"
    query: 'sum(rate(http_requests_total[5m])) by (service, method, code)'
    table: "http_request_rate"
